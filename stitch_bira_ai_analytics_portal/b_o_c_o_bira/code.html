<body class="text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim shadow-[0px_4px_20px_rgba(0,0,0,0.05)] docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center px-margin-mobile w-full h-16">

<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">

</div>
</div>
<h1 class="font-display-md text-display-md text-primary dark:text-primary-fixed-dim tracking-tight">BIRA</h1>
<div class="flex items-center">
<button class="hover:opacity-80 transition-opacity duration-200 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">notifications</span>
</button>
</div>
</div>
</header>
<main class="px-margin-mobile pt-lg space-y-lg">
<!-- Welcome Card -->

<!-- Search Bar -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full bg-surface-card border border-border-light rounded-full py-md pl-12 pr-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-300 shadow-sm" placeholder="Tìm kiếm báo cáo, chỉ số..." type="text" style="transform: scale(1);">
</div><div class="flex items-center gap-sm mt-md"></div>

<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
  <button class="bg-secondary-container text-on-secondary-container px-6 py-1 rounded-full font-label-md transition-all duration-200 active:scale-95">
    Tất cả
  </button>
  <button class="bg-surface-container text-on-surface-variant px-6 py-1 rounded-full font-label-md hover:bg-surface-variant transition-all duration-200 active:scale-95">
    Yêu thích
  </button>
</div>

</div>
<div class="dashed-divider w-full h-[1px]"></div>
<!-- Report Cards Bento/Grid -->

<!-- Card 1: Revenue Analytics -->

  <span class="material-symbols-outlined">apps</span>
  <span class="font-label-md text-label-md">Apps</span>
</a></nav>
<script>
        // Micro-interaction for cards
        document.querySelectorAll('.bg-surface-card').forEach(card => {
            card.addEventListener('mousedown', () => {
                card.style.transform = 'scale(0.98)';
            });
            card.addEventListener('mouseup', () => {
                card.style.transform = 'scale(1)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'scale(1)';
            });
        });

        // Simple animation for the bar chart placeholder on load
        window.addEventListener('DOMContentLoaded', () => {
            const bars = document.querySelectorAll('.rounded-t-lg');
            bars.forEach((bar, index) => {
                const targetHeight = bar.style.height;
                bar.style.height = '0px';
                setTimeout(() => {
                    bar.style.height = targetHeight;
                }, 200 + (index * 100));
            });
        });
    </script>
