<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .teal-gradient {
            background: linear-gradient(135deg, #00A79D 0%, #00766E 100%);
        }
        .high-quality-shadow {
            box-shadow: 0px 8px 16px rgba(0, 167, 157, 0.2);
        }
        .card-shadow {
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.05);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bento-pattern {
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-md overflow-hidden relative">
<!-- Ambient Background Elements -->
<div class="absolute inset-0 bento-pattern opacity-30 pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-[440px] relative z-10">
<!-- Logo Header -->
<div class="text-center mb-xl">
<h1 class="font-display-md text-display-md text-primary tracking-tight mb-xs">BI PORTAL</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Business Intelligence Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-card p-xl rounded-xl card-shadow border border-white/40 backdrop-blur-sm">
<form class="space-y-lg" id="login-form">
<!-- Username Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="username">Tên đăng nhập</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-[48px] pr-md py-3 bg-background border border-border-light rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-body-md text-on-surface placeholder:text-outline/60" id="username" name="username" placeholder="Nhập tên đăng nhập của bạn" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Mật khẩu</label>

</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-[48px] pr-md py-3 bg-background border border-border-light rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-body-md text-on-surface" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="pass-icon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full teal-gradient text-on-primary font-title-lg text-title-lg py-4 rounded-full high-quality-shadow hover:opacity-95 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-sm mt-xl group" type="submit">
<span class="">Đăng nhập</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-xl pt-lg border-t border-dashed border-border-light text-center">

</div>
</div>
<!-- Footer Visual Hint -->
<div class="mt-xl grid grid-cols-3 gap-md opacity-40">
<div class="h-1 teal-gradient rounded-full"></div>
<div class="h-1 bg-outline-variant rounded-full"></div>
<div class="h-1 bg-outline-variant rounded-full"></div>
</div>
</main>
<!-- Visual Background Imagery -->
<div class="fixed right-[-5%] bottom-[-5%] w-[60%] h-[70%] hidden lg:block opacity-20 pointer-events-none">
<div class="w-full h-full relative">
<div class="absolute inset-0 bg-primary/10 rounded-xl skew-y-6 transform rotate-6 border border-primary/20"></div>
<div class="absolute inset-0 bg-white/40 rounded-xl -skew-y-3 transform -rotate-3 translate-x-12 translate-y-12 border border-white/80"></div>
</div>
</div>
<script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('pass-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Interaction Feedback
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span><span>Đang xác thực...</span>`;
            btn.classList.add('pointer-events-none', 'opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.remove('pointer-events-none', 'opacity-80');
                // Normally redirect here
            }, 1500);
        });
    </script>
